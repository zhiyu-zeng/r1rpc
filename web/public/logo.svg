<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 底层色块 -->
  <rect x="20" y="20" width="60" height="60" rx="15" fill="#1a8cff"/>
  <!-- 负空间切割：斜向的数据通道 -->
