services:
  mysql:
    image: mysql:5.7
    container_name: r1rpc-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: r1rpc_dev
      MYSQL_DATABASE: r1rpc
    ports:
      - "3306:3306"
    volumes:
      - r1rpc-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pr1rpc_dev"]
      interval: 5s
      timeout: 3s
      retries: 30

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: r1rpc-server
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
    ports:
      - "9876:9876"
    restart: unless-stopped

volumes:
  r1rpc-mysql-data:
